services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
      - app_node_modules:/workspace/node_modules
    command: sleep infinity
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/momentum

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: momentum
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:9
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: wes@soundtvmedia.com
      PGADMIN_DEFAULT_PASSWORD: soundTV
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  app_node_modules:
  postgres_data:
  pgadmin_data:
